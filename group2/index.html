<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSE School Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>GSE - Graman School of Excellence</h1>

    <!-- LOGIN -->
    <div id="loginBox" class="card">
        <h3>Login</h3>
        <input type="text" id="userID" placeholder="Enter ID (Gse_001)">
        <input type="password" id="password" placeholder="Password">
        <select id="role">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
        </select>
        <button onclick="login()">Login</button>
    </div>

    <!-- STUDENT PANEL -->
    <div id="studentPanel" class="card hidden">
        <h3 id="studentName"></h3>
        <p><strong>Rank:</strong> <span id="rank"></span></p>
        <p><strong>Homework:</strong> <span id="homework"></span></p>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- ADMIN / TEACHER PANEL -->
    <div id="adminPanel" class="card hidden">
        <h3>Admin / Teacher Panel</h3>

        <input type="text" id="newID" placeholder="Student ID">
        <input type="text" id="newName" placeholder="Student Name">
        <input type="password" id="newPass" placeholder="Password">

        <input type="text" id="subject" placeholder="Subject">
        <input type="number" id="score" placeholder="Score">

        <input type="text" id="rankInput" placeholder="Rank">
        <input type="text" id="homeworkInput" placeholder="Homework">

        <button onclick="addStudent()">Add Student</button>
        <button onclick="addResult()">Add Result</button>

        <button onclick="logout()">Logout</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
